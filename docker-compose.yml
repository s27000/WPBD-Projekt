version: '3.8'
name: cd_ecommerce

services:
  postgres:
    image: postgres:15
    hostname: postgres
    container_name: db_postgres
    ports:
      - "5432:5432"
    env_file:
      - .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    hostname: zookeeper
    container_name: serv_zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
  
  kafka:
    image: confluentinc/cp-kafka:7.4.0
    hostname: kafka
    container_name: trp_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
      - "9101:9101"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
  
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: trp_kafka-ui
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092

  debezium:
    image: debezium/connect:2.4
    hostname: debezium
    container_name: trp_debezium
    depends_on:
      - kafka
      - postgres
    ports:
      - "8083:8083"
    environment:
      BOOTSTRAP_SERVERS: kafka:29092
      GROUP_ID: 1
      CONFIG_STORAGE_TOPIC: connect_configs
      OFFSET_STORAGE_TOPIC: connect_offsets
      STATUS_STORAGE_TOPIC: connect_status
      KEY_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      VALUE_CONVERTER: org.apache.kafka.connect.json.JsonConverter
      KEY_CONVERTER_SCHEMAS_ENABLE: 'false'
      VALUE_CONVERTER_SCHEMAS_ENABLE: 'false'

  debezium-connector:
    image: curlimages/curl:latest
    container_name: trp_debezium-connector
    depends_on:
      - debezium
    env_file:
      - .env
    entrypoint: >
      sh -c "
        echo 'Waiting for Debezium...';
        while [ $$(curl -s -o /dev/null -w ''%{http_code}'' http://debezium:8083/connectors) -ne 200 ]; do
          sleep 2;
        done;
        echo 'Debezium is up! Registering connector...';
        curl -X POST http://debezium:8083/connectors -H 'Content-Type: application/json' -d '{
          \"name\": \"postgres-connector\",
          \"config\": {
            \"connector.class\": \"io.debezium.connector.postgresql.PostgresConnector\",
            \"database.hostname\": \"postgres\",
            \"database.port\": \"5432\",
            \"database.user\": \"'\"$$POSTGRES_USER\"'\",
            \"database.password\": \"'\"$$POSTGRES_PASSWORD\"'\",
            \"database.dbname\": \"'\"$$POSTGRES_DB\"'\",
            \"topic.prefix\": \"dbserver1\",
            \"table.include.list\": \"public.klienci,public.albumy,public.zamowienia\",
            \"plugin.name\": \"pgoutput\",
            \"key.converter\": \"org.apache.kafka.connect.json.JsonConverter\",
            \"key.converter.schemas.enable\": \"false\",
            \"value.converter\": \"org.apache.kafka.connect.json.JsonConverter\",
            \"value.converter.schemas.enable\": \"false\",
            \"transforms\": \"unwrap\",
            \"transforms.unwrap.type\": \"io.debezium.transforms.ExtractNewRecordState\",
            \"transforms.unwrap.drop.tombstones\": \"false\",
            \"transforms.unwrap.delete.handling.mode\": \"rewrite\",
            \"transforms.unwrap.add.fields\": \"op,table\"
          }
        }';
      "
  db_postgres_setup:
    image: python:3.11-slim
    container_name: db_postgres_setup
    depends_on:
      debezium-connector:
        condition: service_completed_successfully
      minio-setup:
        condition: service_completed_successfully
      kafka-consumer:
        condition: service_started
    env_file:
      - .env
    environment:
      POSTGRES_HOST: postgres
    volumes:
      - ./data_scripts:/app/data_scripts
      - ./data:/app/data
      - postgres_setup_flag:/setup_flag
      - consumer_ready_flag:/consumer_flag
      - spark_ready_flag:/spark_flag
    working_dir: /app
    entrypoint: >
      sh -c "
        if [ -f /setup_flag/initialized ]; then
          echo '[INFO] Setup already done, skipping.';
          exit 0;
        fi;
        echo '[INFO] Waiting for kafka-consumer to be ready...';
        while [ ! -f /consumer_flag/ready ]; do
          sleep 5;
        done;
        echo '[INFO] Waiting for Spark job ready flags...';
        while [ ! -f /spark_flag/albumy_ready ] || [ ! -f /spark_flag/klienci_ready ] || [ ! -f /spark_flag/zamowienia_ready ]; do
          sleep 5;
        done;
        echo '[INFO] Spark and Kafka Services ready. Installing dependencies...';
        pip install pandas psycopg2-binary python-dotenv --quiet;
        echo '[INFO] Running setup script...';
        python data_scripts/r_generuj_kontekst_bd.py;
        touch /setup_flag/initialized;
        echo '[INFO] Setup complete!';
      "

  kafka-consumer:
    image: python:3.11-slim
    container_name: trp_kafka-consumer
    depends_on:
      debezium-connector:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./kafka:/app/kafka
      - consumer_ready_flag:/consumer_flag
    working_dir: /app
    tty: true
    stdin_open: true
    entrypoint: >
      sh -c "
        echo '[INFO] Installing dependencies...';
        pip install kafka-python --quiet;
        echo '[INFO] Starting consumer...';
        python kafka/kafka_consumer.py;
      "

  spark:
    image: apache/spark:3.4.0
    hostname: spark
    container_name: trp_spark
    depends_on:
      - kafka
    ports:
      - "4040:4040"
      - "7077:7077"
    environment:
      SPARK_MODE: master
      SPARK_RPC_AUTHENTICATION_ENABLED: no
      SPARK_RPC_ENCRYPTION_ENABLED: no
      SPARK_LOCAL_STORAGE_ENCRYPTION_ENABLED: no
      SPARK_SSL_ENABLED: no
    volumes:
      - ./spark:/opt/spark/jobs
    command: sleep infinity

  spark-albumy-job:
    image: apache/spark:3.4.0
    container_name: trp_spark-albumy-job
    depends_on:
      - spark
      - kafka
      - minio-setup
      - kafka-consumer
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./spark:/opt/spark/jobs
      - consumer_ready_flag:/consumer_flag
      - spark_ready_flag:/spark_flag
    working_dir: /opt/spark/jobs
    entrypoint: >
      sh -c "
        echo '[INFO] Waiting for kafka-consumer ready flag...';
        while [ ! -f /consumer_flag/ready ]; do sleep 3; done;
        echo '[INFO] Consumer ready. Submitting process_albumy job...';
        /opt/spark/bin/spark-submit --packages io.delta:delta-core_2.12:2.4.0,org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.0,org.apache.hadoop:hadoop-aws:3.3.4 --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog /opt/spark/jobs/process_albumy.py;
      "

  spark-klienci-job:
    image: apache/spark:3.4.0
    container_name: trp_spark-klienci-job
    depends_on:
      - spark
      - kafka
      - minio-setup
      - kafka-consumer
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./spark:/opt/spark/jobs
      - consumer_ready_flag:/consumer_flag
      - spark_ready_flag:/spark_flag
    working_dir: /opt/spark/jobs
    entrypoint: >
      sh -c "
        echo '[INFO] Waiting for kafka-consumer ready flag...';
        while [ ! -f /consumer_flag/ready ]; do sleep 3; done;
        echo '[INFO] Consumer ready. Submitting process_klienci job...';
        /opt/spark/bin/spark-submit --packages io.delta:delta-core_2.12:2.4.0,org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.0,org.apache.hadoop:hadoop-aws:3.3.4 --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog /opt/spark/jobs/process_klienci.py;
      "

  spark-zamowienia-job:
    image: apache/spark:3.4.0
    container_name: trp_spark-zamowienia-job
    depends_on:
      - spark
      - kafka
      - minio-setup
      - kafka-consumer
    environment:
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./spark:/opt/spark/jobs
      - consumer_ready_flag:/consumer_flag
      - spark_ready_flag:/spark_flag
    working_dir: /opt/spark/jobs
    entrypoint: >
      sh -c "
        echo '[INFO] Waiting for kafka-consumer ready flag...';
        while [ ! -f /consumer_flag/ready ]; do sleep 3; done;
        echo '[INFO] Consumer ready. Submitting process_zamowienia job...';
        /opt/spark/bin/spark-submit --packages io.delta:delta-core_2.12:2.4.0,org.apache.spark:spark-sql-kafka-0-10_2.12:3.4.0,org.apache.hadoop:hadoop-aws:3.3.4 --conf spark.sql.extensions=io.delta.sql.DeltaSparkSessionExtension --conf spark.sql.catalog.spark_catalog=org.apache.spark.sql.delta.catalog.DeltaCatalog /opt/spark/jobs/process_zamowienia.py;
      "

  minio:
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    hostname: minio
    container_name: dl_minio
    ports:
      - "9000:9000"
      - "9090:9001"
    env_file:
      - .env
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"

  minio-setup:
    image: alpine:latest
    container_name: dl_minio-setup
    depends_on:
      - minio
    env_file:
      - .env
    entrypoint: >
      sh -c "
        apk add --no-cache curl;
        curl -L https://dl.min.io/client/mc/release/linux-amd64/mc -o /usr/local/bin/mc;
        chmod +x /usr/local/bin/mc;
        echo 'Waiting for MinIO...';
        while ! curl -s --max-time 5 http://minio:9000 > /dev/null; do
          sleep 2;
        done;
        echo 'MinIO is up! Creating bucket...';
        /usr/local/bin/mc alias set minio http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD;
        /usr/local/bin/mc mb minio/cd-ecommerce --ignore-existing;
        echo 'MinIO bucket created successfully!';
      "
      
volumes:
  postgres_data:
  minio_data:
  postgres_setup_flag:
  consumer_ready_flag:
  spark_ready_flag: